<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KVS Result Analysis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #e3f2fd, #ffffff);
      margin: 0;
      padding: 0;
    }

    header {
      display: flex;
      align-items: center;
      background-color: #1976d2;
      color: white;
      padding: 15px;
    }

    header img {
      height: 50px;
      margin-right: 15px;
    }

    header h1 {
      font-size: 20px;
      margin: 0;
    }

    .container {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      color: #1976d2;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background-color: #1976d2;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0d47a1;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #e8f5e9;
      border-radius: 5px;
      text-align: center;
      font-weight: bold;
      color: #2e7d32;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/8f/Kendriya_Vidyalaya_logo.png/120px-Kendriya_Vidyalaya_logo.png" alt="KVS Logo">
    <h1>Kendriya Vidyalaya Sangathan - Class 12 Result Analysis</h1>
  </header>

  <!-- Main Form -->
  <div class="container">
    <h2>Enter Student Details</h2>

    <label>Maths Marks</label>
    <input type="number" id="maths" placeholder="Enter Maths marks">

    <label>Physics Marks</label>
    <input type="number" id="physics" placeholder="Enter Physics marks">

    <label>Chemistry Marks</label>
    <input type="number" id="chemistry" placeholder="Enter Chemistry marks">

    <label>English Marks</label>
    <input type="number" id="english" placeholder="Enter English marks">

    <label>Optional Subject Marks</label>
    <input type="number" id="optional" placeholder="Enter Optional marks">

    <button onclick="predict()">Get Result</button>

    <div id="output" class="result" style="display:none;"></div>
  </div>

  <!-- Script -->
  <script>
    async function predict() {

      const data = {
        maths: document.getElementById("maths").value,
        physics: document.getElementById("physics").value,
        chemistry: document.getElementById("chemistry").value,
        english: document.getElementById("english").value,
        optional: document.getElementById("optional").value
      };

      try {
        const response = await fetch("https://back-end-ml-digital-classifier-7.onrender.com", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        document.getElementById("output").style.display = "block";
        document.getElementById("output").innerHTML =
          "Prediction Result: " + JSON.stringify(result);

      } catch (error) {
        document.getElementById("output").style.display = "block";
        document.getElementById("output").innerHTML =
          "Error connecting to API ❌";
      }
    }
  </script>

</body>
</html>
