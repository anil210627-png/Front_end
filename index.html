<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KVS ML Web App</title>
<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#f5f7fa,#c3cfe2);
    margin:0;
}
.header{
    display:flex;
    align-items:center;
    background:#7a0019;
    color:white;
    padding:15px 20px;
}
.logo{
    width:60px;
    height:60px;
    margin-right:15px;
}
.title{
    font-size:24px;
    font-weight:bold;
}
.container{
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}
input, textarea, button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}
button{
    background:#7a0019;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
}
button:hover{
    background:#a00022;
}
.result{
    margin-top:20px;
    padding:15px;
    background:#f1f3f6;
    border-radius:8px;
    font-weight:bold;
}
.footer{
    text-align:center;
    margin-top:30px;
    color:#555;
    font-size:13px;
}
</style>
</head>

<body>

<div class="header">
<svg class="logo" viewBox="0 0 100 100">
<circle cx="50" cy="50" r="45" fill="#ffcc00" stroke="#ffffff" stroke-width="5"/>
<text x="50%" y="55%" text-anchor="middle" font-size="28" fill="#7a0019" font-weight="bold" font-family="Arial">KVS</text>
</svg>
<div class="title">Kendriya Vidyalaya Sangathan – ML Web Application</div>
</div>

<div class="container">

<h3>Enter Input for Prediction</h3>

<label>Enter Text / Values</label>
<textarea id="textInput" rows="4" placeholder="Enter values or text here..."></textarea>

<label>Or Upload File</label>
<input type="file" id="fileInput">

<button onclick="sendData()">Get Prediction</button>

<div class="result" id="resultBox">
Prediction result will appear here.
</div>

</div>

<div class="footer">
Developed for Kendriya Vidyalaya Sangathan ML Application
</div>

<script>
async function sendData(){

const text = document.getElementById("textInput").value;
const fileInput = document.getElementById("fileInput");
const resultBox = document.getElementById("resultBox");

let formData = new FormData();

if(text){
formData.append("text", text);
}

if(fileInput.files.length > 0){
formData.append("file", fileInput.files[0]);
}

resultBox.innerHTML = "Processing prediction...";

try{

const response = await fetch("https://back-end-ml-digital-classifier-9.onrender.com",{
method:"POST",
body:formData
});

const data = await response.json();

resultBox.innerHTML = "Prediction Result:<br><br>" + JSON.stringify(data);

}catch(error){
resultBox.innerHTML = "Error connecting to API.";
}
}
</script>

</body>
</html>
